services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bemagro-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: busybox:stable
    container_name: bemagro-db
    command: sh -c "mkdir -p /data && tail -f /dev/null"
    volumes:
      - ./data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bemagro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
